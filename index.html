<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Calculator</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f1ec;
      --surface: #fffdf9;
      --text: #1a1a18;
      --muted: #5c5a55;
      --accent: #1d4f3f;
      --accent-hover: #163d31;
      --border: #d8d2c8;
      --result-bg: #e8f0ec;
      --shadow: 0 12px 40px rgb(26 26 24 / 8%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1e1b;
        --text: #f2efe8;
        --muted: #a8a49a;
        --accent: #5fae92;
        --accent-hover: #7bc4a8;
        --border: #3a3832;
        --result-bg: #1a2a24;
        --shadow: 0 12px 40px rgb(0 0 0 / 35%);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.75rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .lede {
      margin: 0 0 1.75rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 1.1rem;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    label {
      display: grid;
      gap: 0.4rem;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .hint {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.8rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
    }

    input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    input:user-invalid {
      border-color: #c0392b;
    }

    button {
      margin-top: 0.25rem;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .results {
      margin-top: 1.5rem;
      padding: 1.25rem 1.5rem;
      background: var(--result-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: none;
    }

    .results.visible {
      display: block;
    }

    .results h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .result-grid {
      display: grid;
      gap: 0.85rem;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }

    .result-item span:first-child {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .result-item strong {
      font-size: 1.05rem;
      font-variant-numeric: tabular-nums;
    }

    .result-item.primary strong {
      font-size: 1.5rem;
      color: var(--accent);
    }

    .error {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      background: #fdecea;
      color: #922b21;
      font-size: 0.9rem;
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      .error {
        background: #3a1f1c;
        color: #f5a89a;
      }
    }

    .error.visible {
      display: block;
    }

    .schedule {
      margin-top: 1.5rem;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      display: none;
    }

    .schedule.visible {
      display: block;
    }

    .schedule h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      max-height: 24rem;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      font-variant-numeric: tabular-nums;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 0.65rem 0.85rem;
      background: var(--result-bg);
      border-bottom: 1px solid var(--border);
      text-align: right;
      font-size: 0.75rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      white-space: nowrap;
    }

    thead th:first-child {
      text-align: center;
    }

    tbody td {
      padding: 0.55rem 0.85rem;
      border-bottom: 1px solid var(--border);
      text-align: right;
      white-space: nowrap;
    }

    tbody td:first-child {
      text-align: center;
      color: var(--muted);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--result-bg);
    }
  </style>
</head>
<body>
  <main>
    <h1>Mortgage Calculator</h1>
    <p class="lede">Estimate your monthly payment, total interest, and loan cost.</p>

    <form id="calculator" novalidate>
      <label>
        Home price
        <input type="number" id="homePrice" name="homePrice" min="1" step="1000" value="350000" required>
      </label>

      <label>
        Down payment
        <input type="number" id="downPayment" name="downPayment" min="0" step="1000" value="70000" required>
        <span class="hint" id="downPercent">20% of home price</span>
      </label>

      <label>
        Interest rate (% per year)
        <input type="number" id="interestRate" name="interestRate" min="0" max="30" step="0.01" value="6.5" required>
      </label>

      <label>
        Loan term (years)
        <input type="number" id="loanTerm" name="loanTerm" min="1" max="40" step="1" value="30" required>
      </label>

      <button type="submit">Calculate</button>
    </form>

    <p class="error" id="error" role="alert"></p>

    <section class="results" id="results" aria-live="polite">
      <h2>Your estimate</h2>
      <div class="result-grid">
        <div class="result-item primary">
          <span>Monthly payment</span>
          <strong id="monthlyPayment">—</strong>
        </div>
        <div class="result-item">
          <span>Loan amount</span>
          <strong id="loanAmount">—</strong>
        </div>
        <div class="result-item">
          <span>Total interest</span>
          <strong id="totalInterest">—</strong>
        </div>
        <div class="result-item">
          <span>Total cost</span>
          <strong id="totalCost">—</strong>
        </div>
      </div>
    </section>

    <section class="schedule" id="schedule" aria-labelledby="schedule-heading">
      <h2 id="schedule-heading">Installment schedule</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Rate (%/yr)</th>
              <th scope="col">Payment</th>
              <th scope="col">Principal</th>
              <th scope="col">Interest</th>
              <th scope="col">Balance</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("calculator");
    const errorEl = document.getElementById("error");
    const resultsEl = document.getElementById("results");
    const scheduleEl = document.getElementById("schedule");
    const scheduleBody = document.getElementById("scheduleBody");
    const downPercentEl = document.getElementById("downPercent");

    const fields = {
      homePrice: document.getElementById("homePrice"),
      downPayment: document.getElementById("downPayment"),
      interestRate: document.getElementById("interestRate"),
      loanTerm: document.getElementById("loanTerm"),
    };

    const outputs = {
      monthlyPayment: document.getElementById("monthlyPayment"),
      loanAmount: document.getElementById("loanAmount"),
      totalInterest: document.getElementById("totalInterest"),
      totalCost: document.getElementById("totalCost"),
    };

    const currency = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0,
    });

    const currencyPrecise = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });

    function updateDownPercent() {
      const homePrice = Number(fields.homePrice.value);
      const downPayment = Number(fields.downPayment.value);

      if (!homePrice || downPayment < 0) {
        downPercentEl.textContent = "";
        return;
      }

      const percent = (downPayment / homePrice) * 100;
      downPercentEl.textContent = `${percent.toFixed(1)}% of home price`;
    }

    function calculateMortgage(principal, annualRate, years) {
      const months = years * 12;
      const monthlyRate = annualRate / 100 / 12;

      if (monthlyRate === 0) {
        const payment = principal / months;
        return {
          monthlyPayment: payment,
          totalPaid: principal,
          totalInterest: 0,
        };
      }

      const factor = Math.pow(1 + monthlyRate, months);
      const monthlyPayment = (principal * monthlyRate * factor) / (factor - 1);
      const totalPaid = monthlyPayment * months;
      const totalInterest = totalPaid - principal;

      return { monthlyPayment, totalPaid, totalInterest };
    }

    function buildAmortizationSchedule(principal, annualRate, years, monthlyPayment) {
      const months = years * 12;
      const monthlyRate = annualRate / 100 / 12;
      let balance = principal;
      const schedule = [];

      for (let period = 1; period <= months; period++) {
        const interest = monthlyRate === 0 ? 0 : balance * monthlyRate;
        const principalPaid = period === months ? balance : monthlyPayment - interest;
        const payment = principalPaid + interest;
        balance = Math.max(0, balance - principalPaid);

        schedule.push({
          period,
          payment,
          principal: principalPaid,
          interest,
          balance,
        });
      }

      return schedule;
    }

    function renderSchedule(schedule, annualRate) {
      scheduleBody.replaceChildren();

      const rateLabel = `${annualRate.toFixed(2)}%`;
      const fragment = document.createDocumentFragment();

      for (const row of schedule) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.period}</td>
          <td>${rateLabel}</td>
          <td>${currencyPrecise.format(row.payment)}</td>
          <td>${currencyPrecise.format(row.principal)}</td>
          <td>${currencyPrecise.format(row.interest)}</td>
          <td>${currencyPrecise.format(row.balance)}</td>
        `;
        fragment.appendChild(tr);
      }

      scheduleBody.appendChild(fragment);
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.add("visible");
      resultsEl.classList.remove("visible");
      scheduleEl.classList.remove("visible");
    }

    function clearError() {
      errorEl.textContent = "";
      errorEl.classList.remove("visible");
    }

    function handleCalculate(event) {
      event.preventDefault();
      clearError();

      const homePrice = Number(fields.homePrice.value);
      const downPayment = Number(fields.downPayment.value);
      const interestRate = Number(fields.interestRate.value);
      const loanTerm = Number(fields.loanTerm.value);

      if (!homePrice || homePrice <= 0) {
        showError("Enter a valid home price.");
        return;
      }

      if (downPayment < 0) {
        showError("Down payment cannot be negative.");
        return;
      }

      if (downPayment >= homePrice) {
        showError("Down payment must be less than the home price.");
        return;
      }

      if (interestRate < 0 || interestRate > 30) {
        showError("Enter an interest rate between 0% and 30%.");
        return;
      }

      if (!loanTerm || loanTerm < 1 || loanTerm > 40) {
        showError("Enter a loan term between 1 and 40 years.");
        return;
      }

      const principal = homePrice - downPayment;
      const { monthlyPayment, totalPaid, totalInterest } = calculateMortgage(
        principal,
        interestRate,
        loanTerm
      );

      outputs.monthlyPayment.textContent = currency.format(monthlyPayment);
      outputs.loanAmount.textContent = currency.format(principal);
      outputs.totalInterest.textContent = currency.format(totalInterest);
      outputs.totalCost.textContent = currency.format(totalPaid + downPayment);

      const schedule = buildAmortizationSchedule(
        principal,
        interestRate,
        loanTerm,
        monthlyPayment
      );
      renderSchedule(schedule, interestRate);

      resultsEl.classList.add("visible");
      scheduleEl.classList.add("visible");
    }

    fields.homePrice.addEventListener("input", updateDownPercent);
    fields.downPayment.addEventListener("input", updateDownPercent);
    form.addEventListener("submit", handleCalculate);

    updateDownPercent();
    handleCalculate(new Event("submit"));
  </script>
</body>
</html>
